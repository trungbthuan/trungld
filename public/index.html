<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>AI Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <style>
            body {
                font-family: Arial;
                margin: 0;
                background: #f4f6fb;
            }

            /* HEADER */
            .header {
                background: #4f46e5;
                color: white;
                padding: 15px;
                font-size: 20px;
            }

            /* CONTAINER */
            .container {
                max-width: 1200px;
                margin: auto;
            }

            /* GRID */
            .grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 15px;
            }

            @media (max-width: 1024px) {
                .grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }

            @media (max-width: 600px) {
                .grid {
                    grid-template-columns: 1fr;
                }
            }

            /* CARD */
            .card {
                background: white;
                padding: 15px;
                border-radius: 12px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            }

            /* KPI */
            .kpi {
                text-align: center;
                font-size: 18px;
            }

            .kpi strong {
                display: block;
                font-size: 24px;
                margin-top: 5px;
            }

            /* CHART GRID */
            .chart-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-top: 20px;
            }

            /* TABLE */
            #result {
                max-height: 400px;
                overflow: auto;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                border: #4f46e5 1px solid;
            }

            #result::-webkit-scrollbar {
                width: 8px;
            }

            #result::-webkit-scrollbar-thumb {
                background: #c7d2fe;
                border-radius: 10px;
            }

            /* TABLE */
            #result table {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
                background: white;
            }

            /* HEADER */
            #result thead th {
                position: sticky;
                top: 0;
                background: #4f46e5;
                color: white;
                text-align: left;
                padding: 10px;
                z-index: 1;
            }

            /* CELL */
            #result td {
                padding: 10px;
                border-bottom: 1px solid #eee;
                border: 1px solid #787878;
            }

            /* ZEBRA */
            #result tbody tr:nth-child(even) {
                background: #f9fafb;
            }

            /* HOVER */
            #result tbody tr:hover {
                background: #eef2ff;
                cursor: pointer;
                transition: 0.2s;
            }

            /* BORDER RADIUS FIX */
            #result table tr:first-child th:first-child {
                border-top-left-radius: 12px;
            }
            #result table tr:first-child th:last-child {
                border-top-right-radius: 12px;
            }
            /* Highlight học sinh yếu / giỏi */
            .good {
                background: #dcfce7 !important; /* xanh */
            }

            .bad {
                background: #fee2e2 !important; /* đỏ */
            }

            /* RESPONSIVE */
            @media (max-width: 768px) {
                .grid {
                    grid-template-columns: 1fr 1fr;
                }
                .chart-grid {
                    grid-template-columns: 1fr;
                }
            }
            canvas {
                width: 100% !important;
                height: 100% !important;
            }
        </style>
    </head>

    <body>
        <div class="header">🚀 AI Dashboard Excel</div>

        <div class="container">
            <!-- Upload -->
            <div class="card">
                <input type="file" id="fileInput" />
                <button onclick="uploadFile()">Upload</button>

                <input type="text" id="searchInput" placeholder="Tìm kiếm..." />
                <input type="number" id="minValue" placeholder="Avg >=" />
                <button onclick="applyFilter()">Lọc</button>

                <button onclick="analyzeAI()">🤖 AI</button>
            </div>

            <!-- KPI -->
            <div class="grid">
                <div class="card kpi">👥 Tổng <strong id="total"></strong></div>
                <div class="card kpi">📊 Avg <strong id="avg"></strong></div>
                <div class="card kpi">📈 Max <strong id="max"></strong></div>
                <div class="card kpi">📉 Min <strong id="min"></strong></div>
            </div>

            <!-- Charts -->
            <div class="chart-grid">
                <div class="card">
                    <h3>Gender</h3>
                    <div style="height: 300px">
                        <canvas id="genderChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3>Class</h3>
                    <div style="height: 300px">
                        <canvas id="classChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- AI -->
            <div class="card">
                <h3>🤖 AI Insight</h3>
                <div id="aiResult"></div>
            </div>

            <!-- Table -->
            <div class="card">
                <h3>📋 Data</h3>
                <div id="result"></div>
            </div>
        </div>

        <!-- <script src="main.js"></script> -->

        <script>
            let originalData = [];
            let genderChart, classChart;

            // KPI
            function updateKPI(data) {
                const avgArr = data.map((r) => Number(r.average) || 0);

                document.getElementById("total").innerText = data.length;
                document.getElementById("avg").innerText = (avgArr.reduce((a, b) => a + b, 0) / data.length).toFixed(2);

                document.getElementById("max").innerText = Math.max(...avgArr);
                document.getElementById("min").innerText = Math.min(...avgArr);
            }

            async function uploadFile() {
                try {
                    document.getElementById("result").innerHTML = "⏳ Đang upload...";

                    const file = document.getElementById("fileInput").files[0];
                    if (!file) return alert("Chọn file!");

                    const formData = new FormData();
                    formData.append("file", file);

                    const res = await fetch("/upload", {
                        method: "POST",
                        body: formData,
                    });

                    const result = await res.json();
                    const data = Array.isArray(result) ? result : result.data;

                    if (!Array.isArray(data)) return alert("Sai format");

                    originalData = data;
                    updateUI(data);
                } catch (err) {
                    console.error(err);
                    alert("Upload lỗi!");
                }
            }

            function applyFilter() {
                let data = [...originalData];

                const keyword = document.getElementById("searchInput").value.toLowerCase();
                const min = document.getElementById("minValue").value;

                if (keyword) {
                    data = data.filter((row) => Object.values(row).some((v) => String(v).toLowerCase().includes(keyword)));
                }

                if (min) {
                    data = data.filter((row) => Number(row.average) >= min);
                }

                updateUI(data);
            }

            // render bảng
            function renderTable(data) {
                if (!data || !data.length) {
                    document.getElementById("result").innerHTML = "Không có dữ liệu";
                    return;
                }

                const keys = Object.keys(data[0]);

                let html = "<table><tr>";

                // header
                keys.forEach((key) => {
                    html += `<th>${key}</th>`;
                });
                html += "</tr>";

                // rows
                data.forEach((row) => {
                    html += `<tr class="${Number(row.average) >= 8 ? "good" : Number(row.average) < 5 ? "bad" : ""}">`;
                    keys.forEach((key) => {
                        html += `<td>${row[key]}</td>`;
                    });

                    html += "</tr>";
                });

                html += "</table>";

                document.getElementById("result").innerHTML = html;
            }

            function processGenderData(data) {
                let result = {
                    Nam: 0,
                    Nu: 0,
                };

                data.forEach((row) => {
                    let gender = row.sex?.toLowerCase();

                    if (gender === "nam") {
                        result.Nam++;
                    } else if (gender === "nữ" || gender === "nu") {
                        result.Nu++;
                    }
                });

                return {
                    labels: ["Nam", "Nữ"],
                    values: [result.Nam, result.Nu],
                };
            }

            function avg(arr) {
                if (!arr.length) return 0;
                return Number(arr.reduce((a, b) => a + b, 0) / arr.length);
            }

            function drawGenderChart(data) {
                const count = { Nam: 0, Nu: 0 };

                data.forEach((r) => {
                    let g = r.sex?.toLowerCase();
                    if (g === "nam") count.Nam++;
                    else count.Nu++;
                });

                const ctx = document.getElementById("genderChart");

                if (genderChart) genderChart.destroy();

                genderChart = new Chart(ctx, {
                    type: "doughnut",
                    data: {
                        labels: ["Nam", "Nữ"],
                        datasets: [
                            {
                                data: [count.Nam, count.Nu],
                                backgroundColor: ["#36A2EB", "#FF6384"],
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        onClick: (e, el) => {
                            if (!el.length) return;
                            filterByGender(["nam", "nữ"][el[0].index]);
                        },
                    },
                });
            }

            function processClassData(data) {
                let map = {};

                data.forEach((r) => {
                    let c = r.class;
                    if (!map[c]) map[c] = [];
                    map[c].push(Number(r.average));
                });

                let entries = Object.entries(map).map(([c, arr]) => ({
                    c,
                    avg: avg(arr),
                }));

                entries.sort((a, b) => b.avg - a.avg);

                return {
                    labels: entries.map((e) => e.c),
                    values: entries.map((e) => e.avg),
                };
            }

            function drawClassChart(data) {
                let map = {};

                data.forEach((r) => {
                    let c = r.class;
                    if (!map[c]) map[c] = [];
                    map[c].push(Number(r.average) || 0);
                });

                const labels = Object.keys(map);
                const values = labels.map((c) => {
                    const arr = map[c];
                    return arr.reduce((a, b) => a + b, 0) / arr.length;
                });

                const ctx = document.getElementById("classChart");

                if (classChart) classChart.destroy();

                classChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels,
                        datasets: [{ label: "Avg", data: values }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        onClick: (e, el) => {
                            if (!el.length) return;
                            filterByClass(labels[el[0].index]);
                        },
                    },
                });
            }

            function filterByGender(g) {
                const f = originalData.filter((r) => r.sex?.toLowerCase().includes(g));
                updateUI(f);
            }

            function filterByClass(c) {
                const f = originalData.filter((r) => r.class === c);
                updateUI(f);
            }

            function updateUI(data) {
                renderTable(data);
                updateKPI(data);
                drawGenderChart(data);
                drawClassChart(data);
            }

            async function analyzeAI() {
                if (!originalData || originalData.length === 0) {
                    return alert("Vui lòng upload file Excel trước!");
                }

                const aiBox = document.getElementById("aiResult");
                aiBox.innerText = "⏳ AI đang phân tích dữ liệu, vui lòng đợi...";

                try {
                    const res = await fetch("/analyze", {
                        // Đảm bảo đường dẫn này khớp với server
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            data: originalData.slice(0, 50), // Chỉ gửi 50 dòng để tránh quá tải prompt
                        }),
                    });

                    if (!res.ok) {
                        const errorData = await res.json();
                        throw new Error(errorData.analysis || "Lỗi server");
                    }

                    const result = await res.json();
                    aiBox.innerText = result.analysis;
                } catch (err) {
                    console.error(err);
                    aiBox.innerText = "❌ Lỗi: " + err.message;
                }
            }
        </script>
    </body>
</html>
