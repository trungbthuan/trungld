<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Dashboard Excel</title>
        <style>
            body {
                font-family: Arial;
                padding: 20px;
            }
            .container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            canvas {
                background: #fff;
                border: 1px solid #ddd;
                padding: 10px;
            }
            table {
                border-collapse: collapse;
                margin-top: 20px;
                width: 100%;
            }
            th,
            td {
                border: 1px solid #ccc;
                padding: 6px;
                text-align: center;
            }
            th {
                background: #eee;
            }
            .highlight {
                background-color: #ffe5e5;
            }
        </style>
    </head>
    <body>
        <h2>🚀 Dashboard Excel</h2>

        <input type="file" id="fileInput" />
        <button onclick="uploadFile()">Upload</button>

        <hr />

        <input type="text" id="searchInput" placeholder="Tìm kiếm..." oninput="applyFilter()" />
        <input type="number" id="minValue" placeholder="Average >=" oninput="applyFilter()" />

        <div class="container">
            <div>
                <h3>Giới tính</h3>
                <canvas id="genderChart"></canvas>
            </div>
            <div>
                <h3>Lớp</h3>
                <canvas id="classChart"></canvas>
            </div>
        </div>

        <div id="result"></div>

        <script>
            let originalData = [];
            let genderChart, classChart;

            async function uploadFile() {
                const file = document.getElementById("fileInput").files[0];
                if (!file) return alert("Chọn file!");

                const formData = new FormData();
                formData.append("file", file);

                const res = await fetch("/upload", { method: "POST", body: formData });
                const result = await res.json();

                const data = Array.isArray(result) ? result : result.data;

                if (!Array.isArray(data)) return alert("Sai format");

                originalData = data;
                updateUI(data);
            }

            function updateUI(data) {
                renderTable(data);
                drawGenderChart(data);
                drawClassChart(data);
            }

            function applyFilter() {
                let data = [...originalData];

                const keyword = document.getElementById("searchInput").value.toLowerCase();
                const min = document.getElementById("minValue").value;

                if (keyword) {
                    data = data.filter((row) => Object.values(row).some((v) => String(v).toLowerCase().includes(keyword)));
                }

                if (min) {
                    data = data.filter((row) => Number(row.average) >= min);
                }

                updateUI(data);
            }

            function renderTable(data) {
                if (!data.length) return (document.getElementById("result").innerHTML = "No data");

                const keys = Object.keys(data[0]);
                let html = "<table><tr>";

                keys.forEach((k) => (html += `<th>${k}</th>`));
                html += "</tr>";

                data.forEach((row) => {
                    let cls = Number(row.average) > 7 ? "highlight" : "";
                    html += `<tr class="${cls}">`;
                    keys.forEach((k) => (html += `<td>${row[k]}</td>`));
                    html += "</tr>";
                });

                html += "</table>";
                document.getElementById("result").innerHTML = html;
            }

            function avgArray(arr) {
                if (!arr.length) return 0;
                return (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2);
            }

            function processGenderData(data) {
                let res = { Nam: [], Nu: [] };

                data.forEach((r) => {
                    let g = r.sex?.toLowerCase();
                    let avgVal = Number(r.average);

                    if (g === "nam") res.Nam.push(avgVal);
                    else res.Nu.push(avgVal);
                });

                return {
                    labels: ["Nam", "Nữ"],
                    values: [avg(res.Nam), avg(res.Nu)],
                };
            }

            function processClassData(data) {
                let map = {};

                data.forEach((r) => {
                    let c = r.class;
                    if (!map[c]) map[c] = [];
                    map[c].push(Number(r.average));
                });

                let entries = Object.entries(map).map(([c, arr]) => ({
                    c,
                    avg: avg(arr),
                }));

                entries.sort((a, b) => b.avg - a.avg);

                return {
                    labels: entries.map((e) => e.c),
                    values: entries.map((e) => e.avg),
                };
            }

            function avg(arr) {
                if (!arr.length) return 0;
                return Number(arr.reduce((a, b) => a + b, 0) / arr.length);
            }

            function drawGenderChart(data) {
                const p = processGenderData(data);
                const ctx = document.getElementById("genderChart").getContext("2d");

                if (genderChart) genderChart.destroy();

                genderChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: p.labels,
                        datasets: [{ label: "Gender Avg", data: p.values }],
                    },
                    options: {
                        onClick: (e, el) => {
                            if (!el.length) return;
                            const label = p.labels[el[0].index];
                            filterByGender(label);
                        },
                    },
                });
            }

            function drawClassChart(data) {
                const p = processClassData(data);
                const ctx = document.getElementById("classChart").getContext("2d");

                if (classChart) classChart.destroy();

                classChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: p.labels,
                        datasets: [{ label: "Class Avg", data: p.values }],
                    },
                    options: {
                        onClick: (e, el) => {
                            if (!el.length) return;
                            const label = p.labels[el[0].index];
                            filterByClass(label);
                        },
                    },
                });
            }

            function filterByGender(gender) {
                let g = gender.toLowerCase();
                let filtered = originalData.filter((r) => r.sex.toLowerCase().includes(g));
                updateUI(filtered);
            }

            function filterByClass(cls) {
                let filtered = originalData.filter((r) => r.class === cls);
                updateUI(filtered);
            }
        </script>
    </body>
</html>
